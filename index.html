<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food brings people together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --page: #e8d9c0;
      --ink: #1e1810;
      --muted: rgba(0, 0, 0, 0.62);
      --overlay: rgba(80, 70, 60, 0.84);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
    }

    body {
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", "Consolas", "Courier New", monospace;
      color: var(--ink);
      cursor: default;
      background: var(--page);
      min-height: 100vh;
    }

    .site-header {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 1.5rem 1.25rem 1rem;
    }

    .site-header h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.35;
    }

    .site-header p {
      margin: 0;
      max-width: 64ch;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: max(100vh, 40rem);
      margin: 0;
      padding: 0 0.5rem 5.5rem;
      cursor: crosshair;
    }

    .site-bar {
      position: fixed;
      z-index: 30;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin: 0;
      padding: 1rem 1.25rem;
      font: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--page);
      border: none;
      border-top: 1px solid rgba(40, 30, 20, 0.12);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
      cursor: pointer;
    }

    .clear-btn:hover,
    .clear-btn:focus-visible {
      background: #dfd6c0;
    }

    .clear-btn:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: -2px;
    }

    .photo-block {
      position: absolute;
      overflow: hidden;
    }

    .photo-crop {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f0e8;
      box-shadow:
        0 0 0 2px #fff,
        0 0 0 3px rgba(0, 0, 0, 0.08),
        0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .photo-crop,
    .photo-crop img {
      border-radius: inherit;
    }

    .photo-block img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-block .shroud {
      position: absolute;
      z-index: 2;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      text-align: center;
      background: var(--overlay);
      color: #fff;
      font-size: clamp(0.6rem, 1.4vw, 0.8rem);
      line-height: 1.4;
      letter-spacing: 0.03em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .photo-block:hover .shroud {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <h1>Food brings people together</h1>
    <p>Shared meals, small rituals, and the people around the table.</p>
  </header>

  <div class="stage" id="stage" aria-live="polite"></div>

  <div class="site-bar">
    <button type="button" class="clear-btn" id="clear-btn" aria-label="Clear all images from the screen">Clear screen</button>
  </div>

  <script>
    (function () {
      /* Food photos only */
      var files = [
        "beach icecream.JPG",
        "big little date.JPG",
        "birthday treats.JPG",
        "boyfriends birthday.JPG",
        "camping trip in the smokies.JPG",
        "catching up with an old friend.JPG",
        "coffee and catchup.JPG",
        "crumb cake with my bestie.JPG",
        "Dolly's cinnamon bread.JPG",
        "friends goofy treat.JPG",
        "gal-intines donuts.JPG",
        "gingerbread house tradition.JPG",
        "grandma's frenchtoast.JPG",
        "homemade birthday pizza.JPG",
        "impromptu dinner with family.JPG",
        "lake pizza.JPG",
        "last minute sweet treat.JPG",
        "Mcdonalds with friends in Chicgo.JPG",
        "maybe we should give them some privacy.JPG",
        "mincraft meal.JPG",
        "recipe shared with friends.JPG",
        "Shared with roomates.JPG",
        "spreak tomato soup pt. 1.JPG",
        "spreak tomato soup pt. 2 .JPG",
        "sushi with dad.JPG",
        "tavern style in Chicago.JPG",
        "work cookies.JPG"
      ];

      function displayNameFromFile(name) {
        return name.replace(/\.jpe?g$/i, "");
      }

      function assetUrl(file) {
        return "assets/" + encodeURIComponent(file);
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function shuffleInPlace(a) {
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      var deckOrder = [];
      var deckIndex = 0;
      var lastPickedFile = null;

      function refillDeck() {
        deckOrder = files.slice();
        shuffleInPlace(deckOrder);
        if (deckOrder.length > 1 && lastPickedFile && deckOrder[0] === lastPickedFile) {
          var k = 1 + Math.floor(Math.random() * (deckOrder.length - 1));
          var tmp = deckOrder[0];
          deckOrder[0] = deckOrder[k];
          deckOrder[k] = tmp;
        }
        deckIndex = 0;
      }

      function pickFile() {
        if (deckIndex >= deckOrder.length) {
          refillDeck();
        }
        var f = deckOrder[deckIndex];
        deckIndex++;
        lastPickedFile = f;
        return f;
      }

      var stage = document.getElementById("stage");
      var clearBtn = document.getElementById("clear-btn");
      var z = 1;
      var maxVisible = 30;

      function addPhoto() {
        var file = pickFile();
        var block = document.createElement("div");
        block.className = "photo-block";
        block.style.zIndex = String(z++);

        var w = rand(16, 44);
        var h = rand(20, 48);
        var top = rand(0, 65);
        var left = rand(0, 78);

        block.style.width = w + "vmin";
        block.style.height = h + "vmin";
        block.style.top = top + "%";
        block.style.left = left + "%";
        block.style.transform = "rotate(" + rand(-9, 9).toFixed(1) + "deg)";
        block.style.borderRadius = rand(0, 1) > 0.5 ? (rand(2, 18) + "px") : "0";

        var crop = document.createElement("div");
        crop.className = "photo-crop";

        var img = document.createElement("img");
        img.src = assetUrl(file);
        img.alt = displayNameFromFile(file);
        img.loading = "lazy";
        img.decoding = "async";

        var shroud = document.createElement("div");
        shroud.className = "shroud";
        shroud.textContent = displayNameFromFile(file);

        crop.appendChild(img);
        crop.appendChild(shroud);
        block.appendChild(crop);
        stage.appendChild(block);
        while (stage.children.length > maxVisible) {
          stage.removeChild(stage.firstElementChild);
        }
      }

      stage.addEventListener("click", function (ev) {
        ev.stopPropagation();
        addPhoto();
      });

      clearBtn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        ev.preventDefault();
        stage.replaceChildren();
        z = 1;
      });

      addPhoto();
    })();
  </script>
</body>

</html>
